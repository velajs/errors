name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type (leave empty for auto-detection)'
        required: false
        type: choice
        options:
          - ''
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm run build

      - name: Get latest tag
        id: latest_tag
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"

      - name: Get commits since last tag
        id: commits
        run: |
          LATEST_TAG="${{ steps.latest_tag.outputs.tag }}"

          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"%s" | head -50)
          else
            COMMITS=$(git log ${LATEST_TAG}..HEAD --pretty=format:"%s")
          fi

          echo "Commits since $LATEST_TAG:"
          echo "$COMMITS"

          echo "$COMMITS" > /tmp/commits.txt

          if [ -z "$COMMITS" ]; then
            echo "has_commits=false" >> $GITHUB_OUTPUT
          else
            echo "has_commits=true" >> $GITHUB_OUTPUT
          fi

      - name: Determine version bump type
        id: version_type
        if: steps.commits.outputs.has_commits == 'true'
        run: |
          if [ -n "${{ inputs.version_type }}" ]; then
            echo "type=${{ inputs.version_type }}" >> $GITHUB_OUTPUT
            echo "Using manual version type: ${{ inputs.version_type }}"
            exit 0
          fi

          COMMITS=$(cat /tmp/commits.txt)

          # Compat policy: stay on 1.x and break freely. A breaking change
          # (`type!:` / BREAKING CHANGE) ships as a MINOR bump, never an
          # automatic major. An intentional major is opt-in only, via the
          # workflow_dispatch `version_type: major` input handled above.
          if echo "$COMMITS" | grep -qE "^[a-z]+(\(.+\))?!:|BREAKING CHANGE|^feat(\(.+\))?:"; then
            echo "type=minor" >> $GITHUB_OUTPUT
            echo "Detected: minor (feature or breaking change — 1.x break-freely policy)"
            exit 0
          fi

          if echo "$COMMITS" | grep -qE "^(fix|perf|refactor|enhance)(\(.+\))?:"; then
            echo "type=patch" >> $GITHUB_OUTPUT
            echo "Detected: patch"
            exit 0
          fi

          echo "type=" >> $GITHUB_OUTPUT
          echo "No releasable commits found"

      - name: Bump version
        id: bump
        if: steps.commits.outputs.has_commits == 'true' && steps.version_type.outputs.type != ''
        run: |
          LATEST_TAG="${{ steps.latest_tag.outputs.tag }}"
          CURRENT_VERSION=$(node -p "require('./package.json').version")

          # First release: publish current version as-is
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "new=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "First release: publishing v${CURRENT_VERSION} as-is"
            exit 0
          fi

          VERSION_TYPE="${{ steps.version_type.outputs.type }}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          case "$VERSION_TYPE" in
            major)
              NEW_VERSION="$((MAJOR + 1)).0.0"
              ;;
            minor)
              NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"
              ;;
            patch)
              NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
              ;;
          esac

          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumping version: $CURRENT_VERSION -> $NEW_VERSION"

          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '$NEW_VERSION';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Commit and tag
        if: steps.bump.outputs.new != ''
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new }}"
          CURRENT_VERSION="${{ steps.bump.outputs.current }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ "$NEW_VERSION" != "$CURRENT_VERSION" ]; then
            pnpm install --lockfile-only
            git add package.json pnpm-lock.yaml
            git commit -m "chore(release): v${NEW_VERSION}"
          fi

          git tag -a "v${NEW_VERSION}" -m "Release v${NEW_VERSION}"
          git push origin main --follow-tags

      - name: Publish to npm
        if: steps.bump.outputs.new != ''
        run: pnpm publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "${{ !github.event.repository.private }}"

      - name: Create GitHub Release
        if: steps.bump.outputs.new != ''
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: v${{ steps.bump.outputs.new }}
          name: v${{ steps.bump.outputs.new }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Skip release
        if: steps.commits.outputs.has_commits != 'true' || steps.version_type.outputs.type == ''
        run: |
          echo "No release needed."
          echo "has_commits: ${{ steps.commits.outputs.has_commits }}"
          echo "version_type: ${{ steps.version_type.outputs.type }}"
