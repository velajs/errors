name: Publish

# Publishes the CURRENT package.json version to npm on demand. The auto-release
# (release.yml) only fires on new commits; this lets an already-bumped+tagged
# version that missed publication (e.g. a run before NPM_TOKEN was configured)
# be published without a synthetic bump. `npm publish` no-ops loudly if the
# version already exists.
on:
  workflow_dispatch: {}
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 26
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install

      - run: pnpm run build

      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "${{ !github.event.repository.private }}"
