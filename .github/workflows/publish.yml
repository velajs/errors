name: Publish

# Publishes the CURRENT package.json version to npm on demand. The auto-release
# (release.yml) only fires on new commits; this lets an already-bumped+tagged
# version that missed publication (e.g. a run before NPM_TOKEN was configured)
# be published without a synthetic bump. `npm publish` no-ops loudly if the
# version already exists.
on:
  workflow_dispatch: {}
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 26
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install

      - run: pnpm run build

      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "${{ !github.event.repository.private }}"
